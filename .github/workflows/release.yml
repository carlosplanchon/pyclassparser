# Publish pyclassparser to PyPI using Trusted Publishing (OIDC), no API tokens.
#
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   * PyPI Project Name: pyclassparser
#   * Owner:             carlosplanchon
#   * Repository name:   pyclassparser
#   * Workflow name:     release.yml
#   * Environment name:  pypi
# For the very first upload, add it as a "pending publisher" so the project can
# be created automatically on the first publish.
#
# Afterwards: bump `version` in pyproject.toml, then push a matching `v`-prefixed
# tag to trigger the release (version `0.9` uses tag `v0.9`):
#     git tag v0.9 && git push origin v0.9

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14"
          enable-cache: true

      # A PyPI upload can never be replaced, so refuse to build if the pushed
      # tag and the packaged version disagree. Remove this step if your tags do
      # not encode the version.
      - name: Verify tag matches project version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "$version" ]; then
            echo "::error::Release tag '${GITHUB_REF_NAME}' does not match pyproject version '${version}'."
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyclassparser
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
